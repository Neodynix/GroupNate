<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GroupNate | Payment Successful</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles/main.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ... (Keep your existing CSS from success.html here) ... */
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #0a0f1e; }
        .success-card { max-width: 450px; width: 90%; text-align: center; padding: 50px 30px; background: rgba(20, 25, 40, 0.95); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; color: white;}
        .icon-circle { width: 100px; height: 100px; border: 2px solid #2ed573; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 0 auto 25px auto; color: #2ed573; font-size: 3rem; }
        .ref-box { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; margin-bottom: 30px; font-family: monospace; color: #ccc; }
        .apply-btn { background: #e94560; color: white; padding: 15px; border: none; border-radius: 10px; width: 100%; cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="icon-circle"><i class="fa-solid fa-check"></i></div>
        <h1 id="statusTitle">Verifying Payment...</h1>
        <p id="statusMessage">Please wait while we confirm your upgrade with the server.</p>
        <div class="ref-box" id="refBox" style="display:none;"></div>
        <button class="apply-btn" onclick="window.location.href='dashboard.html'" id="returnBtn" style="display:none;">Return to Dashboard</button>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const trackingId = urlParams.get('OrderTrackingId');
            const merchantRef = urlParams.get('OrderMerchantReference');

            if (!trackingId || !merchantRef) {
                document.getElementById('statusTitle').innerText = "Payment Error";
                document.getElementById('statusTitle').style.color = "#ff4757";
                document.getElementById('statusMessage').innerText = "No tracking information found.";
                document.getElementById('returnBtn').style.display = "block";
                return;
            }

            document.getElementById('refBox').style.display = 'block';
            document.getElementById('refBox').innerText = "Ref: " + trackingId;

            // Failsafe: Manually trigger the listener function to verify the payment
            try {
                // Initialize Supabase (Use your actual Anon Key and URL here)
                const supabaseUrl = 'YOUR_SUPABASE_URL';
                const supabaseKey = 'YOUR_SUPABASE_ANON_KEY';
                const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

                // Call the listener function directly!
                const { error } = await supabase.functions.invoke('pesapal-ipn-listener', {
                    method: 'GET',
                    // Pass the IDs in the query string just like Pesapal would
                    query: { 
                        OrderTrackingId: trackingId, 
                        OrderMerchantReference: merchantRef 
                    }
                });

                if (error) throw error;

                document.getElementById('statusTitle').innerText = "Payment Successful!";
                document.getElementById('statusMessage').innerText = "Your account has been upgraded. You now have access to premium features.";
                
            } catch (err) {
                console.error("Verification Error:", err);
                document.getElementById('statusTitle').innerText = "Verification Pending";
                document.getElementById('statusTitle').style.color = "#f1c40f";
                document.getElementById('statusMessage').innerText = "Payment received, but we are still verifying the upgrade. It should reflect on your dashboard shortly.";
            } finally {
                document.getElementById('returnBtn').style.display = "block";
            }
        });
    </script>
</body>
                                     </html>
