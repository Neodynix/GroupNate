<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GroupNate | Payment Status</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/payment-status.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="success-card glass-panel">
        
        <div class="icon-circle" id="statusIcon">
            <i class="fa-solid fa-circle-notch fa-spin"></i>
        </div>
        
        <h1 id="statusTitle">Verifying...</h1>
        <p id="statusMessage">Please wait while we confirm your transaction securely with the bank.</p>
        
        <div class="ref-box" id="refBox" style="display:none;"></div>
        
        <button class="action-btn" onclick="window.location.href='dashboard.html'" id="returnBtn" style="display:none;">
            Return to Dashboard
        </button>
    </div>

    <script src="js/payment-status.js"></script>
</body>
    </html>
